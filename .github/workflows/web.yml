name: Web CI

on:
  pull_request:
    branches: ['main']
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  push:
    branches: ['main']

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint -w web
      - run: npm run typecheck -w web
      - run: npm run build -w web
