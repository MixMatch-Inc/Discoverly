services:
  mongo:
    image: mongo:7
    container_name: discoverly-mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: discoverly-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/discoverly
      JWT_SECRET: replace_me
      STELLAR_NETWORK: testnet
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
